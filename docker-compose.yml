services:

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
    volumes:
      - azurite_data:/data
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --location /data
      --loose
      --skipApiVersionCheck

  init-azurite:
    build:
      context: ./infra/scripts
      dockerfile: Dockerfile
    container_name: init-azurite
    environment:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;"
      AZURE_BLOB_CONTAINER: csv-uploads
      AZURE_QUEUE_NAME: csv-jobs
    depends_on:
      azurite:
        condition: service_started
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: salesdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d salesdb"]
      interval: 5s
      retries: 5
  
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: worker
    env_file:
      - ./worker/.env
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
      init-azurite:
        condition: service_completed_successfully

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
      init-azurite:
        condition: service_completed_successfully

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: salesdb
      DB_POSTGRESDB_USER: user
      DB_POSTGRESDB_PASSWORD: pass
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  azurite_data:
  pgdata:
  n8n_data: